<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Introduction Video</title>

<style>
body{
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Container */
.container{
  width: 90%;
  max-width: 900px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Heading */
h1, h2{
  text-align: center;
  color: white;
}

/* Video */
iframe{
  width: 100%;
  height: 400px;
  border-radius: 12px;
  margin-top: 15px;
}

/* Card */
.card{
  margin-top: 25px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
}

/* Text display */
#highlightBox{
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: white;
  color: black;
  line-height: 1.6;
}

/* Highlight */
.highlight{
  background: yellow;
  font-weight: bold;
}

/* Buttons */
.controls{
  margin-top: 15px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

button{
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(45deg, #ff7eb3, #ff758c);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover{
  transform: scale(1.05);
}

/* Responsive */
@media(max-width:600px){
  iframe{
    height: 250px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🎥 CSS Introduction Video</h1>
<p style="text-align:center; color:white;">
Learn the basics of CSS from this video.
</p>

<iframe 
src="https://www.youtube.com/embed/TioxU0wdMQg"
allowfullscreen>
</iframe>

<!-- TTS Section -->
<div class="card">
<h2>🔊 About This Video</h2>

<div id="highlightBox"></div>

<div class="controls">
  <button onclick="playSpeech()">▶ Play</button>
  <button onclick="pauseSpeech()">⏸ Pause</button>
  <button onclick="resumeSpeech()">⏯ Resume</button>
  <button onclick="stopSpeech()">⏹ Stop</button>
</div>
</div>

</div>

<script>
const text = `This video teaches the basics of CSS.

CSS means Cascading Style Sheets.
It is used to style HTML pages using colors, fonts, and layouts.

You will learn how to apply styles to text, backgrounds, and elements.

The video also explains why CSS is important.
It makes websites attractive and user friendly.

You will understand different types of CSS like inline, internal, and external CSS.

It also covers selectors, properties, and basic syntax.

By the end of the video, you will know how CSS works with HTML to design beautiful web pages.
`;

let words = text.split(" ");
let index = 0;
let utterance;

const box = document.getElementById("highlightBox");

function renderText(highlightIndex = -1){
  box.innerHTML = words.map((word, i) => {
    return i === highlightIndex 
      ? `<span class="highlight">${word}</span>` 
      : word;
  }).join(" ");
}

renderText();

function playSpeech(){
  speechSynthesis.cancel();
  index = 0;
  renderText();

  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;

  utterance.onboundary = function(event){
    if(event.name === "word"){
      renderText(index);
      index++;
    }
  };

  speechSynthesis.speak(utterance);
}

function pauseSpeech(){
  speechSynthesis.pause();
}

function resumeSpeech(){
  speechSynthesis.resume();
}

function stopSpeech(){
  speechSynthesis.cancel();
  index = 0;
  renderText();
}
</script>

</body>
</html>
