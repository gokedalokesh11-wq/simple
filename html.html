<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Course</title>  <!-- Google Font -->  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      min-height:100vh;
      background:linear-gradient(135deg,#667eea,#764ba2);
      display:flex;
      flex-direction:column;
      color:white;
    }

    /* Navbar */
    .navbar{
      width:100%;
      padding:15px 30px;
      background:rgba(0,0,0,0.2);
      backdrop-filter:blur(10px);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .navbar a{
      color:white;
      text-decoration:none;
      font-weight:500;
      transition:0.3s;
    }

    .navbar a:hover{
      color:#ffd369;
    }

    /* Main Container */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:40px;
      margin-bottom:10px;
    }

    p{
      margin-bottom:30px;
      opacity:0.8;
    }

    /* Card Grid */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      width:100%;
      max-width:900px;
    }

    /* Cards */
    .card{
      background:rgba(255,255,255,0.1);
      padding:25px;
      border-radius:20px;
      backdrop-filter:blur(10px);
      transition:0.3s;
      cursor:pointer;
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-10px) scale(1.03);
      box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    .card h3{
      margin-bottom:10px;
    }

    .card p{
      font-size:14px;
      opacity:0.7;
    }

    .card a{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      text-decoration:none;
    }

    /* Footer */
    .footer{
      text-align:center;
      padding:15px;
      font-size:14px;
      opacity:0.7;
    }

  </style></head>
<body>  <div class="navbar">
    <a href="index.html">Home</a>
  </div>  <div class="main">
    <h1>🚀 HTML Course</h1>
    <p>Learn HTML step by step with interactive lessons</p><div class="grid">

  <div class="card">
    <h3>📘 HTML Introduction</h3>
    <p>Basics of HTML and structure</p>
    <a href="html_introduction.html"></a>
  </div>

  <div class="card">
    <h3>🧩 HTML Elements</h3>
    <p>Understand tags and elements</p>
    <a href="html_elements.html"></a>
  </div>

  <div class="card">
    <h3>🎓 Full Course</h3>
    <p>Complete HTML learning in one place</p>
    <a href="HtmlFullCourse.html"></a>
  </div>

  <div class="card">
    <h3>🧠 Quiz</h3>
    <p>Test your knowledge</p>
    <a href="Html quiz.html"></a>
  </div>

</div>

  </div>  <div class="footer">
    © 2026 HTML Learning Platform
  </div></body>
</html>
