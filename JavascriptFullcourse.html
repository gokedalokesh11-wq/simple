<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Introduction Video</title>

<style>
body{
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
}

/* Container */
.container{
  width: 90%;
  max-width: 900px;
  margin: 40px auto;
  padding: 25px;
  border-radius: 15px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Headings */
h1, h2{
  text-align: center;
  color: white;
}

/* Video */
iframe{
  width: 100%;
  height: 400px;
  border-radius: 12px;
  margin-top: 15px;
}

/* Card */
.card{
  margin-top: 25px;
  padding: 20px;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
}

/* Text display */
#highlightBox{
  margin-top: 15px;
  padding: 15px;
  border-radius: 10px;
  background: white;
  color: black;
  line-height: 1.6;
}

/* Highlight word */
.highlight{
  background: yellow;
  font-weight: bold;
}

/* Controls */
.controls{
  margin-top: 15px;
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* Buttons */
button{
  padding: 10px 15px;
  border-radius: 8px;
  border: none;
  background: linear-gradient(45deg, #ff7eb3, #ff758c);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover{
  transform: scale(1.05);
}

/* Responsive */
@media(max-width:600px){
  iframe{
    height: 250px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🎥 CSS Full course</h1>
<p style="text-align:center; color:white;">
Learn the basics of CSS from this video.
</p>

<iframe 
src="https://www.youtube.com/embed/PkZNo7MFNFg"
allowfullscreen>
</iframe>

<!-- TTS Section -->
<div class="card">
<h2>🔊 About This Video</h2>

<div id="highlightBox"></div>

<div class="controls">
  <button onclick="playSpeech()">▶ Play</button>
  <button onclick="pauseSpeech()">⏸ Pause</button>
  <button onclick="resumeSpeech()">⏯ Resume</button>
  <button onclick="stopSpeech()">⏹ Stop</button>
</div>
</div>

</div>

<script>
const text = `This video is a complete beginner guide to web development using HTML, CSS, and JavaScript.

It starts with HTML basics like headings, paragraphs, buttons, and images.

Then it introduces CSS, which is used to style web pages using colors, fonts, spacing, and layouts.

You will learn how to design attractive websites and improve user interface.

The video also covers JavaScript basics, which adds interactivity to websites.

You will see how to handle events, update content, and make web pages dynamic.

By the end of this video, you will understand how HTML, CSS, and JavaScript work together to build real websites.
`;

let words = text.split(" ");
let index = 0;
let utterance;

const box = document.getElementById("highlightBox");

function renderText(highlightIndex = -1){
  box.innerHTML = words.map((word, i) => {
    return i === highlightIndex 
      ? `<span class="highlight">${word}</span>` 
      : word;
  }).join(" ");
}

renderText();

function playSpeech(){
  speechSynthesis.cancel();
  index = 0;
  renderText();

  utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 0.9;

  utterance.onboundary = function(event){
    if(event.name === "word"){
      renderText(index);
      index++;
    }
  };

  speechSynthesis.speak(utterance);
}

function pauseSpeech(){
  speechSynthesis.pause();
}

function resumeSpeech(){
  speechSynthesis.resume();
}

function stopSpeech(){
  speechSynthesis.cancel();
  index = 0;
  renderText();
}
</script>

</body>
</html>
