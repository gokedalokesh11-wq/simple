<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Advanced Dashboard</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet"><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:#fff;
}

.navbar{
  padding:20px;
  text-align:center;
  font-size:24px;
  font-weight:600;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

.main{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:rgba(255,255,255,0.1);
  border-radius:20px;
  padding:25px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  backdrop-filter:blur(15px);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px) scale(1.02);
}

h2{
  margin-bottom:15px;
}

.progress-container{
  width:100%;
  height:25px;
  background:rgba(255,255,255,0.2);
  border-radius:50px;
  overflow:hidden;
}

#progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  text-align:center;
  line-height:25px;
  font-size:14px;
  transition:0.5s;
}

button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#ff512f,#dd2476);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.stat-box{
  text-align:center;
}

.stat-box h3{
  font-size:22px;
}

.badge{
  margin-top:10px;
  display:inline-block;
  padding:8px 15px;
  border-radius:20px;
  background:gold;
  color:black;
  font-size:14px;
}

</style></head>
<body><div class="navbar">🚀 Student Dashboard</div><div class="main"><div class="card">
  <h2>📘 Course Progress</h2>
  <div class="progress-container">
    <div id="progress-bar">0%</div>
  </div>
  <button onclick="increaseProgress()">Complete Lesson</button>
</div><div class="card">
  <h2>🏆 Certificate</h2>
  <p>Complete 100% to unlock certificate</p>
  <button onclick="goCertificate()">Download Certificate</button>
</div><div class="card">
  <h2>📊 Stats</h2>
  <div class="stats">
    <div class="stat-box">
      <h3 id="lessons">0</h3>
      <p>Lessons</p>
    </div>
    <div class="stat-box">
      <h3 id="score">0</h3>
      <p>Score</p>
    </div>
  </div>
</div><div class="card">
  <h2>🔥 Achievement</h2>
  <p id="badge-text">No badge yet</p>
  <div id="badge"></div>
</div></div><script>
let progress = 0;
let lessons = 0;
let score = 0;

function increaseProgress(){
  if(progress < 100){
    progress += 10;
    lessons++;
    score += 5;

    document.getElementById("progress-bar").style.width = progress + "%";
    document.getElementById("progress-bar").innerHTML = progress + "%";

    document.getElementById("lessons").innerHTML = lessons;
    document.getElementById("score").innerHTML = score;

    checkBadge();
  }
}

function checkBadge(){
  let badge = document.getElementById("badge");
  let text = document.getElementById("badge-text");

  if(progress >= 100){
    badge.innerHTML = '<span class="badge">🎓 Completed</span>';
    text.innerHTML = "You earned completion badge!";
  }
  else if(progress >= 50){
    badge.innerHTML = '<span class="badge">⭐ Halfway</span>';
    text.innerHTML = "You're halfway there!";
  }
}

function goCertificate(){
  if(progress === 100){
    window.location.href = "certificate.html";
  } else {
    alert("Complete course first!");
  }
}
</script></body>
  </html>
